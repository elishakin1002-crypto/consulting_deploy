<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#f8f9fa"/>
  
  <!-- 人物轮廓 -->
  <g transform="translate(200, 200)">
    <!-- 头部 -->
    <circle cx="0" cy="-60" r="50" fill="#fdbcb4" stroke="#333" stroke-width="2"/>
    
    <!-- 身体 -->
    <rect x="-40" y="-10" width="80" height="120" rx="10" fill="#1a365d" stroke="#333" stroke-width="2"/>
    
    <!-- 衬衫 -->
    <rect x="-30" y="-10" width="60" height="80" fill="#ffffff" stroke="#333" stroke-width="1"/>
    
    <!-- 领带 -->
    <polygon points="-8,-10 8,-10 12,30 0,40 -12,30" fill="#dc2626" stroke="#333" stroke-width="1"/>
    
    <!-- 眼镜 -->
    <g stroke="#333" stroke-width="2" fill="none">
      <circle cx="-15" cy="-65" r="12"/>
      <circle cx="15" cy="-65" r="12"/>
      <line x1="-3" y1="-65" x2="3" y2="-65"/>
    </g>
    
    <!-- 眼睛 -->
    <circle cx="-15" cy="-65" r="3" fill="#333"/>
    <circle cx="15" cy="-65" r="3" fill="#333"/>
    
    <!-- 嘴巴 -->
    <path d="M -10,-45 Q 0,-40 10,-45" stroke="#333" stroke-width="2" fill="none"/>
    
    <!-- 头发 -->
    <path d="M -45,-85 Q 0,-110 45,-85 L 40,-60 Q 0,-70 -40,-60 Z" fill="#2d3748"/>
  </g>
  
  <!-- 标签 -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#2d3748" font-weight="bold">曾云俊 总经理</text>
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">浙江信义企业管理有限公司</text>
</svg>