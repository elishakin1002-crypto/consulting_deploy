<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 浙江信义企业管理有限公司</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="canonical" href="https://www.xinyi-iso.com/login.html">
    <link rel="stylesheet" href="css/style.css?v=2.2">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css?v=2.1">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>浙江信义企业管理有限公司</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="services.html">服务</a></li>
                    <li><a href="about.html">关于我们</a></li>
                    <li><a href="contact.html">联系我们</a></li>
                    <li><a href="login.html" class="btn-login active">登录</a></li>
                </ul>
            </nav>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <section class="login-section">
        <div class="container">
            <div class="login-container">
                <div class="login-header">
                    <h2>用户登录</h2>
                    <p>登录您的账户，获取专业企业管理服务</p>
                </div>
                <div class="login-tabs">
                    <button class="tab-btn active" data-tab="login">登录</button>
                    <button class="tab-btn" data-tab="register">注册</button>
                </div>
                <div class="login-form-container">
                    <form id="login-form" class="tab-content active">
                        <div class="form-group">
                            <label for="login-email">电子邮箱</label>
                            <input type="email" id="login-email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">密码</label>
                            <input type="password" id="login-password" name="password" required>
                            <a href="#" class="forgot-password">忘记密码?</a>
                        </div>
                        <div class="form-group remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">记住我</label>
                        </div>
                        <button type="submit" class="btn btn-login-submit">登录</button>
                        <div class="login-message" id="login-message"></div>
                    </form>

                    <form id="register-form" class="tab-content">
                        <div class="form-group">
                            <label for="register-name">姓名</label>
                            <input type="text" id="register-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="register-email">电子邮箱</label>
                            <input type="email" id="register-email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">密码</label>
                            <input type="password" id="register-password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="register-confirm-password">确认密码</label>
                            <input type="password" id="register-confirm-password" name="confirm-password" required>
                        </div>
                        <div class="form-group terms">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">我同意<a href="#">服务条款</a>和<a href="#">隐私政策</a></label>
                        </div>
                        <button type="submit" class="btn btn-register-submit">注册</button>
                        <div class="login-message" id="register-message"></div>
                    </form>
                </div>
                <div class="social-login">
                    <p>或通过以下方式登录</p>
                    <div class="social-icons">
                        <button class="social-btn wechat"><i class="fab fa-weixin"></i> 微信</button>
                        <button class="social-btn weibo"><i class="fab fa-weibo"></i> 微博</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>浙江信义企业管理有限公司</h3>
                    <p>提供专业的企业管理咨询服务，助力企业成长</p>
                </div>
                <div class="footer-section">
                    <h3>快速链接</h3>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="services.html">服务</a></li>
                        <li><a href="about.html">关于我们</a></li>
                        <li><a href="contact.html">联系我们</a></li>
                        <li><a href="login.html">登录</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>联系我们</h3>
                    <p><i class="fas fa-map-marker-alt"></i> 浙江省温州经济技术开发区机场大道4079号701室</p>
                    <p><i class="fas fa-phone"></i> 13676797588</p>
                    <p><i class="fas fa-envelope"></i> 87333310@qq.com</p>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <div class="social-icons">
                        <a href="#"><i class="fab fa-weixin"></i></a>
                        <a href="#"><i class="fab fa-weibo"></i></a>
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                    </div>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2023 浙江信义企业管理有限公司. 保留所有权利</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js?v=20260307c"></script>
    <script src="js/login.js"></script>
</body>
</html>
